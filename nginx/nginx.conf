worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Upstream pool ───────────────────────────────────────────────────────
    # NOTE: With Hetzner Load Balancer, you typically don't need ip_hash
    # The LB handles session affinity. But if using Docker Compose locally,
    # keep ip_hash OR configure the LB's session affinity.
    upstream happy_backend {
        # For Hetzner Cloud LB: Remove ip_hash, let the LB handle it
        # For local Docker Compose: Keep ip_hash for Socket.IO HTTP polling
        # ip_hash;

        # Use least_conn for better load distribution with health checks
        least_conn;

        server app1:3000;
        server app2:3000;

        # When adding more VPS nodes via docker-compose or k8s:
        # server app3:3000;
        # server app4:3000;

        # Health check configuration (Nginx+ only)
        # Requires Nginx Plus subscription. For OSS Nginx, use external monitoring.
        # check interval=3000 rise=2 fall=5 timeout=1000 type=http;
        # check_http_send "GET /health/redis HTTP/1.0\r\n\r\n";
        # check_http_expect_alive http_2xx;
    }

    # ── WebSocket connection timeouts ────────────────────────────────────────
    # Socket.IO can use WebSocket, HTTP long-polling, or other protocols.
    # These timeouts must be HIGH to prevent premature disconnections.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Rate limiting zones (optional) ────────────────────────────────────────
    # Limit requests per IP to prevent abuse
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=50r/s;

    server {
        listen 80;
        server_name _;
        client_max_body_size 10M;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── WebSocket routes (higher priority) ──────────────────────────────
        location /game {
            proxy_pass         http://happy_backend;
            proxy_http_version 1.1;
            
            # CRITICAL: These headers enable WebSocket upgrade
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            
            # Standard proxy headers
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;

            # CRITICAL: Long timeouts for persistent WebSocket connections
            # These must be longer than your game session timeout
            proxy_read_timeout   3600s;
            proxy_send_timeout   3600s;
            proxy_connect_timeout 10s;
            
            # Buffering - disable for WebSocket
            proxy_buffering off;
            
            # Rate limiting for WebSocket
            limit_req zone=ws_limit burst=10 nodelay;
            
            # Disable caching for WebSocket
            proxy_cache_bypass $http_upgrade;
        }

        # ── Socket.IO polling fallback (if WebSocket fails) ────────────────
        # Socket.IO automatically falls back to long-polling
        location /socket.io {
            proxy_pass         http://happy_backend;
            proxy_http_version 1.1;
            
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout   3600s;
            proxy_send_timeout   3600s;
            proxy_connect_timeout 10s;
            proxy_buffering off;
            
            limit_req zone=ws_limit burst=10 nodelay;
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://happy_backend;
            proxy_http_version 1.1;
            
            # Do NOT upgrade for regular API calls
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            
            # Timeouts for REST API (shorter than WebSocket)
            proxy_read_timeout  30s;
            proxy_send_timeout  30s;
            proxy_connect_timeout 5s;
            
            # Rate limiting for API
            limit_req zone=api_limit burst=20 nodelay;
        }

        # ── Health check (for Hetzner LB or Kubernetes) ───────────────────
        location /health {
            proxy_pass         http://happy_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log off;
        }

        location /health/redis {
            proxy_pass         http://happy_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log off;
        }

        # ── Deny access to sensitive paths ──────────────────────────────────
        location ~ ^/(\.env|\.git|node_modules|package\.json) {
            return 403;
        }
    }
}
