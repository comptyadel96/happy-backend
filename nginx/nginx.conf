worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Upstream pool ───────────────────────────────────────────────────────
    upstream happy_backend {
        # Sticky sessions by IP — keeps one client on the same instance.
        # Critical for Socket.IO HTTP polling fallback.
        ip_hash;

        server app1:3000;
        server app2:3000;

        # When adding more VPS nodes, just add more lines here:
        # server app3:3000;
    }

    # ── WebSocket connection timeouts ────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # ── HTTP API ──────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://happy_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket upgrade headers
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # Long timeouts for WebSocket connections
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_connect_timeout 10s;
        }

        # ── Health check (for Hetzner LB or monitoring) ───────────────────
        location /health/redis {
            proxy_pass http://happy_backend;
            access_log off;
        }
    }
}
